services:
  postgres:
    image: postgres:16-alpine
    container_name: ${APP_SLUG:-api}-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-api}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-api123}
      POSTGRES_DB: ${DB_NAME:-api}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-api}"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - api-network

  redis:
    image: redis:7-alpine
    container_name: ${APP_SLUG:-api}-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - api-network

volumes:
  postgres-data:
    name: ${APP_SLUG:-api}-postgres-data
    driver: local
  redis-data:
    name: ${APP_SLUG:-api}-redis-data
    driver: local

networks:
  api-network:
    name: ${APP_SLUG:-api}-network
    driver: bridge
